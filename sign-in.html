<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="sign-in.css">
</head>
<body>

    <div class="container">
        <div class="icon">👤</div>

        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your JBM Electro Ventures account</p>

        <form>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="signup">
            Don't have an account? <a href="#">Sign up</a>
        </div>

        <div class="back">
            <a href="javascript:void(0)" onclick="window.location.href='frontend.html'">← Back to Home</a>
        </div>
    </div>

</body>
</html>
