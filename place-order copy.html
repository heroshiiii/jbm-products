<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JBM Products</title>
  <link rel="stylesheet" href="products.css">
</head>

<body>

<div class="container">

  <aside class="sidebar">
    <div class="logo">
      <img src="logo (1).webp" alt="JBM Logo">
    </div>

    <ul class="menu">
      <li>
        <img src="icons/home.png" class="icon">
        <span class="text">Home</span>
      </li>

      <li>
        <img src="icons/boxed.png" class="icon">
        <span class="text">Products</span>
      </li>

      <li class="active">
        <img src="icons/packages.png" class="icon">
        <span class="text">Package Deals</span>
      </li>

      <li>
        <img src="icons/cart.png" class="icon">
        <span class="text">Place Order</span>
      </li>

      <li>
        <img src="icons/calendarr.png" class="icon">
        <span class="text">Book Appointment</span>
      </li>

      <li>
        <img src="icons/circle.png" class="icon">
        <span class="text">Track Status</span>
      </li>
    </ul>

    <div class="account-wrapper">
      <div class="account" id="accountBtn">
        <img src="icons/userr.png" class="icon">
        <span class="text">Account</span>
      </div>

      <div class="account-dropdown" id="accountMenu">
        <div class="dropdown-item">
          <img src="icons/account-setting.png" class="icon">
          <span>Account Settings</span>
        </div>

        <div class="dropdown-item">
          <img src="icons/logoutt.png" class="icon">
          <span>Logout</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <button id="toggleBtn">☰</button>

    <h1>Package Deals</h1>
    <p class="subtitle">Save more with bundled electrical packages</p>

    <div class="top-bar">
      <input type="text" placeholder="Search products...">
      <select>
        <option>All Categories</option>
      </select>
    </div>
  

</div>
      
    </div>
  </main>

</div>
<script src="products.js"></script>
<script src="account.js"></script>

</body>
</html>
